<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LED Matrix BLE</title>
    <link rel="stylesheet" href="web/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="app-title">
        <header class="topbar">
          <div>
            <p class="eyebrow">ESP32 BLE</p>
            <h1 id="app-title">LED Matrix</h1>
          </div>
          <div class="topbar-actions">
            <div class="connection">
              <span id="connectionDot" class="dot" aria-hidden="true"></span>
            </div>
            <div class="topbar-buttons">
              <button
                id="logToggleButton"
                class="icon-button"
                type="button"
                aria-controls="logPanel"
                aria-expanded="false"
                title="Toggle log"
              >&#9881;</button>
              <a class="nav-link" href="soccer.html">Soccer Billboard</a>
              <button id="connectButton" type="button">Connect</button>
              <button id="disconnectButton" type="button" disabled>Disconnect</button>
              <button id="statusButton" type="button" disabled>Status</button>
            </div>
          </div>
        </header>

        <div class="preview-row">
          <canvas id="matrixPreview" class="matrix-preview" width="640" height="160"></canvas>
        </div>

        <section class="controls" aria-label="Matrix controls">
          <div class="field">
            <label for="brightnessInput">Brightness <span id="brightnessValue">8</span></label>
            <input id="brightnessInput" type="range" min="1" max="128" value="8">
          </div>

          <div class="field">
            <label for="speedInput">Speed <span id="speedValue">45 ms</span></label>
            <input id="speedInput" type="range" min="20" max="160" value="45">
          </div>

          <section class="control-group full" aria-label="Text controls">
            <h2 class="group-title">Text Mode</h2>

            <div class="field full">
              <label for="messageInput">Message</label>
              <div class="send-row">
                <input id="messageInput" maxlength="80" value="THANK YOU" autocomplete="off">
                <button id="sendMessageButton" type="button">Send</button>
              </div>
            </div>

            <div class="field full">
              <label>Movement</label>
              <div class="effect-strip full" aria-label="Text movement effects">
                <button type="button" data-motion="SCROLL" aria-pressed="true">Scroll</button>
                <button type="button" data-motion="FLASH" aria-pressed="false">Flash</button>
                <button type="button" data-motion="CENTER" aria-pressed="false">Center</button>
                <button type="button" data-motion="BOUNCE" aria-pressed="false">Bounce</button>
              </div>
            </div>

            <div class="field full">
              <label>Text Color Effect</label>
              <div class="text-color-layout">
                <div class="effect-strip full" aria-label="Text color effects">
                  <button type="button" data-text-colorfx="STATIC" aria-pressed="true">Static</button>
                  <button type="button" data-text-colorfx="RAINBOW_STATIC" aria-pressed="false">Rainbow</button>
                </div>
                <div class="inline-color-picker">
                  <label for="textColorInput">Text color</label>
                  <input id="textColorInput" type="color" value="#ff4614">
                </div>
                <div class="inline-color-picker">
                  <label for="bgColorInput">Background</label>
                  <input id="bgColorInput" type="color" value="#000000">
                </div>
              </div>
            </div>

            <div class="preset-strip full" aria-label="Quick text presets">
              <button type="button" data-message="THANK YOU">THANK YOU</button>
              <button type="button" data-message="SORRY">SORRY</button>
              <button type="button" data-message="LET ME IN">LET ME IN</button>
              <button type="button" data-message="PASS">PASS</button>
              <button type="button" data-message="LEFT NOW">LEFT NOW</button>
              <button type="button" data-message="RIGHT NOW">RIGHT NOW</button>
              <button type="button" data-message="SLOW DOWN">SLOW DOWN</button>
              <button type="button" data-message="NEED HELP">NEED HELP</button>
              <button type="button" data-message="BABY ON BRD">BABY ON BRD</button>
              <button type="button" data-message="NEW DRVR">NEW DRVR</button>
              <button type="button" data-message="NICE CAR">NICE CAR</button>
              <button type="button" data-message="BRAKE TEST">BRAKE TEST</button>
            </div>
          </section>

          <section class="control-group full" aria-label="Visual effects controls">
            <h2 class="group-title">Visual Effects</h2>

            <div class="effect-strip full" aria-label="Visual effects">
              <button type="button" data-effect="TEXT" aria-pressed="true">Text</button>
              <button type="button" data-effect="RAINBOW" aria-pressed="false">Rainbow</button>
              <button type="button" data-effect="BLANK" aria-pressed="false">Blank</button>
            </div>
          </section>
        </section>

        <section id="logPanel" class="terminal collapsed" aria-label="Bluetooth log">
          <div class="terminal-head">
            <span>Log</span>
            <button id="clearLogButton" type="button">Clear</button>
          </div>
          <ol id="logList"></ol>
        </section>
      </section>
    </main>

    <script src="web/app.js" defer></script>
  </body>
</html>
